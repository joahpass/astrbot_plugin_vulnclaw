services:
  vulnclaw-supervisor:
    build:
      context: .
      dockerfile: Dockerfile.supervisor
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-180}
    image: astrbot-vulnclaw-supervisor:0.1.0
    command:
      - uvicorn
      - supervisor.app:app
      - --host
      - 127.0.0.1
      - --port
      - "8765"
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      VULNCLAW_WORKER_SECRET: ${VULNCLAW_WORKER_SECRET:?set a 32+ byte secret}
      VULNCLAW_TASK_IMAGE: astrbot-vulnclaw-worker:0.1.0
      VULNCLAW_TASK_NETWORK: vulnclaw-tasks
      VULNCLAW_ENFORCE_IPTABLES: "true"
      VULNCLAW_SUPERVISOR_DATA: /var/lib/astrbot-vulnclaw
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/astrbot-vulnclaw:/var/lib/astrbot-vulnclaw
    depends_on:
      vulnclaw-worker-image:
        condition: service_completed_successfully

  vulnclaw-worker-image:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-180}
    image: astrbot-vulnclaw-worker:0.1.0
    entrypoint: ["/bin/true"]
    restart: "no"

  vulnclaw-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      network: host
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-180}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: astrbot-vulnclaw-web:0.1.0
    restart: unless-stopped
    ports:
      - "1145:1145"
    environment:
      VULNCLAW_WEB_USERNAME: ${VULNCLAW_WEB_USERNAME:-admin}
      VULNCLAW_WEB_PASSWORD: ${VULNCLAW_WEB_PASSWORD:?set a strong Web UI password}
      VULNCLAW_CONFIG_DIR: /data/config
      VULNCLAW_SESSION_OUTPUT_DIR: /data/output
      VULNCLAW_SAFETY_PYTHON_EXECUTE_ENABLED: "false"
      VULNCLAW_SAFETY_PYTHON_EXECUTE_RESTRICTED: "true"
    volumes:
      - vulnclaw-web-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:1145/healthz', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  default:
    name: vulnclaw-control

volumes:
  vulnclaw-web-data:
    name: astrbot-vulnclaw-web-data
